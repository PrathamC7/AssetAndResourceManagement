<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="only light" />
    <meta name="color-scheme" content="only light" />
    <title>AssetFlow - Enterprise Asset & Resource Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        primary: "rgba(var(--color-primary), <alpha-value>)",
                        background: "rgba(var(--color-background), <alpha-value>)",
                        surface: "rgba(var(--color-surface), <alpha-value>)",
                        "on-surface": "rgba(var(--color-on-surface), <alpha-value>)",
                        "on-surface-variant": "rgba(var(--color-on-surface-variant), <alpha-value>)",
                        "surface-container": "rgba(var(--color-surface-container), <alpha-value>)",
                        "surface-container-low": "rgba(var(--color-surface-container-low), <alpha-value>)",
                        "surface-container-lowest": "rgba(var(--color-surface-container-lowest), <alpha-value>)",
                        "surface-container-highest": "rgba(var(--color-surface-container-highest), <alpha-value>)",
                        "surface-light": "rgba(var(--color-surface), <alpha-value>)",
                        "primary-container": "rgba(var(--color-primary-container), <alpha-value>)",
                        "on-primary-container": "rgba(var(--color-on-primary-container), <alpha-value>)",
                        "secondary-container": "rgba(var(--color-secondary-container), <alpha-value>)",
                        "on-secondary-container": "rgba(var(--color-on-secondary-container), <alpha-value>)",
                        error: "rgba(var(--color-error), <alpha-value>)",
                        "error-container": "rgba(var(--color-error-container), <alpha-value>)",
                        success: "rgba(var(--color-success), <alpha-value>)",
                        warning: "rgba(var(--color-warning), <alpha-value>)",
                        "deep-navy": "rgba(var(--color-deep-navy), <alpha-value>)",
                        outline: "rgba(var(--color-on-surface-variant), 0.4)",
                        "outline-variant": "rgba(var(--color-on-surface-variant), 0.15)",
                        info: "rgba(var(--color-info), <alpha-value>)",
                        danger: "rgba(var(--color-error), <alpha-value>)",
                        "stripe-purple": "#635BFF",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "card": "18px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "base": "8px",
                        "md": "24px",
                        "sm": "12px",
                        "xs": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "button": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-xl-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primary: 79, 70, 229; /* indigo-600 */
            --color-background: 248, 250, 252; /* slate-50 */
            --color-surface: 255, 255, 255; /* white */
            --color-on-surface: 15, 23, 42; /* slate-900 */
            --color-on-surface-variant: 71, 85, 105; /* slate-600 */
            --color-surface-container: 241, 245, 249; /* slate-100 */
            --color-surface-container-low: 248, 250, 252;
            --color-surface-container-lowest: 255, 255, 255;
            --color-surface-container-highest: 226, 232, 240; /* slate-200 */
            --color-primary-container: 224, 231, 255; /* indigo-100 */
            --color-on-primary-container: 55, 48, 163; /* indigo-800 */
            --color-secondary-container: 241, 245, 249;
            --color-on-secondary-container: 71, 85, 105;
            --color-error: 239, 68, 68; /* red-500 */
            --color-error-container: 254, 226, 226; /* red-100 */
            --color-success: 16, 185, 129; /* emerald-500 */
            --color-warning: 245, 158, 11; /* amber-500 */
            --color-deep-navy: 15, 23, 42; /* slate-900 */
            --color-info: 14, 165, 233; /* sky-500 */
        }

        html, body, #root {
            color-scheme: only light !important;
            background-color: #ffffff !important;
            color: #0f172a !important;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-nav {
            background: rgba(var(--color-surface), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .sidebar-gradient {
            background: linear-gradient(180deg, rgba(var(--color-deep-navy), 1) 0%, rgba(var(--color-background), 1) 100%);
        }
        .shadow-soft {
            box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.08);
        }
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -4px rgba(15, 23, 42, 0.12);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--color-surface-container-highest), 0.5); border-radius: 10px; }
    </style>
  </head>
  <body class="bg-white text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
